databaseChangeLog:
  - changeSet:
      id: 0.1.0-alpha1-20-storage-file-deleted
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: storage_file
            columns:
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
  - changeSet:
      id: 0.1.0-alpha1-20-storage-placement-deleted
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: storage_blob_placement
            columns:
              - column:
                  name: deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
  - changeSet:
      id: 0.1.0-alpha1-20-storage-placement-drop-resource-id
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - dropUniqueConstraint:
            tableName: storage_blob_placement
            constraintName: uc_storage_blob_placement_resource
        - dropColumn:
            tableName: storage_blob_placement
            columnName: placement_id
  - changeSet:
      id: 0.1.0-alpha1-20-storage-file-purged-at
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: storage_file
            columns:
              - column:
                  name: purged_at
                  type: DATETIME
  - changeSet:
      id: 0.1.0-alpha1-20-storage-placement-purged-at
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: storage_blob_placement
            columns:
              - column:
                  name: purged_at
                  type: DATETIME
