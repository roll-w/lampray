databaseChangeLog:
  - changeSet:
      id: 0.1.0-alpha1-15-storage_blob
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - createTable:
            tableName: storage_blob
            columns:
              - column:
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_storage_blob
                  name: id
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: blob_id
                  type: VARCHAR(64)
              - column:
                  constraints:
                    nullable: false
                  name: content_checksum
                  type: VARCHAR(64)
              - column:
                  constraints:
                    nullable: false
                  name: file_size
                  type: BIGINT
              - column:
                  constraints:
                    nullable: false
                  name: mime_type
                  type: VARCHAR(255)
              - column:
                  constraints:
                    nullable: false
                  name: file_type
                  type: VARCHAR(40)
              - column:
                  constraints:
                    nullable: false
                  name: primary_backend
                  type: VARCHAR(80)
              - column:
                  constraints:
                    nullable: false
                  name: primary_object_key
                  type: VARCHAR(512)
              - column:
                  name: orphaned_at
                  type: DATETIME
              - column:
                  constraints:
                    nullable: false
                  name: create_time
                  type: DATETIME
              - column:
                  constraints:
                    nullable: false
                  name: update_time
                  type: DATETIME
        - addUniqueConstraint:
            columnNames: blob_id
            constraintName: uc_storage_blob_resource
            tableName: storage_blob
        - addUniqueConstraint:
            columnNames: content_checksum
            constraintName: uc_storage_blob_content_checksum
            tableName: storage_blob
