        - modifyDataType:
            tableName: comment
            columnName: comment_on_id
            newDataType: VARCHAR(64)
        - sql:
            sql: UPDATE comment SET parent_id = '' WHERE parent_id = '0' OR parent_id IS NULL;
        - addNotNullConstraint:
            tableName: comment
