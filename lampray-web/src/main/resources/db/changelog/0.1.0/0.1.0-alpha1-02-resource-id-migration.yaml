  - changeSet:
      id: 0.1.0-alpha1-16-user-personal-data-user-id
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      dbms: mysql,mariadb,postgresql,h2,oracle,sqlserver
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: user_personal_data
            columnName: id
        - not:
            columnExists:
              tableName: user_personal_data
              columnName: user_id
      changes:
        - dropPrimaryKey:
            tableName: user_personal_data
        - renameColumn:
            tableName: user_personal_data
            oldColumnName: id
            newColumnName: user_id
            columnDataType: BIGINT
        - addPrimaryKey:
            tableName: user_personal_data
            columnNames: user_id
            constraintName: pk_user_personal_data

  - changeSet:
      id: 0.1.0-alpha1-18-user-personal-data-primary-key-recovery
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      dbms: mysql,mariadb,postgresql,h2,oracle,sqlserver
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: user_personal_data
            columnName: user_id
        - not:
            - primaryKeyExists:
                tableName: user_personal_data
      changes:
        - addPrimaryKey:
            tableName: user_personal_data
            columnNames: user_id
            constraintName: pk_user_personal_data
