databaseChangeLog:
  - changeSet:
      id: 0.1.0-alpha1-15-resource-id-columns
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: article
            columns:
              - column:
                  name: resource_id
                  type: VARCHAR(64)
        - update:
            tableName: article
            columns:
              - column:
                  name: resource_id
                  valueComputed: id
            where: resource_id IS NULL
        - addNotNullConstraint:
            tableName: article
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
            tableName: article
            columnNames: resource_id
            constraintName: uc_article_resource_id

        - addColumn:
            tableName: comment
            columns:
              - column:
                  name: resource_id
                  type: VARCHAR(64)
        - update:
            tableName: comment
            columns:
              - column:
                  name: resource_id
                  valueComputed: id
            where: resource_id IS NULL
        - modifyDataType:
            tableName: comment
            columnName: parent_id
            newDataType: VARCHAR(64)
        - modifyDataType:
            tableName: comment
            columnName: comment_on_id
            newDataType: VARCHAR(64)
        - update:
            tableName: comment
            columns:
              - column:
                  name: parent_id
                  value: ""
            where: parent_id = '0' OR parent_id IS NULL
        - addNotNullConstraint:
            tableName: comment
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
            tableName: comment
            columnNames: resource_id
            constraintName: uc_comment_resource_id

        - addColumn:
            tableName: favorite_group
            columns:
              - column:
                  name: resource_id
                  type: VARCHAR(64)
        - update:
            tableName: favorite_group
            columns:
              - column:
                  name: resource_id
                  valueComputed: id
            where: resource_id IS NULL
        - addNotNullConstraint:
            tableName: favorite_group
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
            tableName: favorite_group
            columnNames: resource_id
            constraintName: uc_favorite_group_resource_id

        - addColumn:
            tableName: favorite_item
            columns:
              - column:
                  name: resource_id
                  type: VARCHAR(64)
        - update:
            tableName: favorite_item
            columns:
              - column:
                  name: resource_id
                  valueComputed: id
            where: resource_id IS NULL
        - modifyDataType:
            tableName: favorite_item
            columnName: group_id
            newDataType: VARCHAR(64)
        - modifyDataType:
            tableName: favorite_item
            columnName: content_id
            newDataType: VARCHAR(64)
        - addNotNullConstraint:
            tableName: favorite_item
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
            tableName: favorite_item
            columnNames: resource_id
            constraintName: uc_favorite_item_resource_id

        - modifyDataType:
            tableName: review_job
            columnName: content_id
            newDataType: VARCHAR(64)
