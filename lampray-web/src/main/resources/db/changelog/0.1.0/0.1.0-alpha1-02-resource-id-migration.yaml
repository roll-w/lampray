        - modifyDataType:
            tableName: comment
            columnName: comment_on_id
            newDataType: VARCHAR(64)
        - update:
            tableName: comment
            columns:
              - column:
                  name: parent_id
                  value: ""
            where: parent_id = '0' OR parent_id IS NULL
        - addNotNullConstraint:
            tableName: comment
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
