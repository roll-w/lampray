databaseChangeLog:
  - changeSet:
      id: 0.1.0-alpha1-15-resource-id-columns
      author: RollW
      objectQuotingStrategy: QUOTE_ONLY_RESERVED_WORDS
      changes:
        - addColumn:
            tableName: article
            columns:
              - column:
                  name: resource_id
                  type: VARCHAR(64)
        - sql:
            sql: UPDATE article SET resource_id = CAST(id AS CHAR(64)) WHERE resource_id IS NULL;
        - addNotNullConstraint:
            tableName: article
            columnName: resource_id
            columnDataType: VARCHAR(64)
        - addUniqueConstraint:
            tableName: article
            columnNames: resource_id
            constraintName: uc_article_resource_id

        - addColumn:
